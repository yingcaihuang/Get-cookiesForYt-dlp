<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="popup.dark.css" />
    <link rel="stylesheet" href="popup-options.css" />
    <link rel="stylesheet" href="iconfont/material-icons.css" />
    <link rel="stylesheet" href="donation.css" />
    <script src="popup.mjs" type="module" defer></script>
    <script src="table-nowrap.js" defer></script>
  </head>

  <body>
    <header>
      <h1>Get cookies.txt for <a id="location"></a></h1>
      <hr />
    </header>
    <main>
      <div class="export-btn-container">
        <button id="export" class="export-btn export">
          <span class="button-text">
            Export
            <span class="material-symbols-outlined">download</span>
          </span>
        </button>
        <button id="exportAs" class="export-btn export-as">
          <span class="button-text">
            Export As
            <span class="material-symbols-outlined">download</span>
          </span>
        </button>
        <button id="copy" class="export-btn copy">
          <span class="button-text default-copy-text">
            Copy
            <span class="material-symbols-outlined">content_paste</span>
          </span>
          <span class="button-text copied-text">
            Copied!
            <span class="material-symbols-outlined">check</span>
          </span>
        </button>
        <button id="toggleDomain" class="export-btn large add-domain">
          <span class="button-text add-domain-text">
            Block
            <span class="material-symbols-outlined">block</span>
          </span>
          <span class="button-text del-domain-text">
            Unblock
            <span class="material-symbols-outlined">check_circle</span>
          </span>
        </button>
        <div class="sync-btn-wrapper">
          <button id="sync" class="export-btn large sync" title="Sync cookies to remote server">
            <span class="button-text default-sync-text">
              Sync
              <span class="material-symbols-outlined">sync</span>
            </span>
            <span class="button-text sync-success-text">
              Synced!
              <span class="material-symbols-outlined">check_circle</span>
            </span>
            <span class="button-text sync-error-text">
              Failed
              <span class="material-symbols-outlined">error</span>
            </span>
          </button>
          <div id="sync-tooltip" class="sync-tooltip" hidden></div>
          <div id="sync-debug" class="sync-debug" hidden></div>
        </div>
        <button id="syncAll" class="export-btn large sync-all" title="Sync all domains (except blacklisted)">
          <span class="button-text default-syncall-text">
            Sync All
            <span class="material-symbols-outlined">cloud_sync</span>
          </span>
          <span class="button-text syncall-success-text">
            All Synced!
            <span class="material-symbols-outlined">check_circle</span>
          </span>
          <span class="button-text syncall-error-text">
            Some Failed
            <span class="material-symbols-outlined">error</span>
          </span>
        </button>
        <button id="exportAll" class="export-btn large export-all">
          <span class="button-text">
            Export All Cookies
            <span class="material-symbols-outlined">download</span>
          </span>
        </button>
        <button id="openSettings" class="export-btn large settings">
          <span class="button-text">
            Settings
            <span class="material-symbols-outlined">settings</span>
          </span>
        </button>
      </div>

      <div id="optionsContainer" class="option-container">
        <div class="format-option option">
          <label for="format">Export Format:</label>
          <select id="format" name="format">
            <option value="netscape" selected>Netscape</option>
            <option value="json">JSON</option>
            <option value="header">Header String</option>
          </select>
        </div>

        <div class="nowrap-option option">
          <label for="nowrapOption">Table Nowrap: </label>
          <input type="checkbox" id="nowrapOption" name="nowrapOption" checked />
        </div>
      </div>

      <div class="table-container">
        <table id="netscapeTable" class="netscape-table nowrap">
          <thead>
            <tr>
              <th>Domain</th>
              <th>Include Subdomains</th>
              <th>Path</th>
              <th>Secure</th>
              <th>Expiry</th>
              <th>Name</th>
              <th>Value</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="donation">
        <details>
          <summary class>Buy Developer a Coffee ☕</summary>
          <div class="donation-description">
            <p>Got many offers to buy this extension, but I'm never going to sell it to spammers!</p>
            <p>By the way, a cup of coffee would make my day 😎</p>
          </div>
          <ul class="payment-buttons-container">
            <li>
              <a class="payment-button" href="https://buymeacoffee.com/kairi003" target="_blank">
                <img src="images/bmc-logo.svg" alt="Buy Me a Coffee" />
              </a>
            </li>
            <li>
              <a class="payment-button" href="https://paypal.me/kairi003" target="_blank">
                <img src="images/paypal-logo.svg" alt="PayPal" /> 
              </a>
            </li>
          </ul>
        </details>
      </div>
    </main>
  </body>
</html>
